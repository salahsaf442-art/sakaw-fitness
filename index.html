<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد التمرين</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1a73e8;
            text-align: center;
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .btn-clear {
            background-color: #dc3545;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 8px;
            border-right: 5px solid #1a73e8;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            gap: 10px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        @media (max-width: 400px) {
            h2 {
                font-size: 18px;
            }

            button {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>تسجيل التمارين</h2>

    <input type="text" id="exName" placeholder="اسم التمرين واسم العضلة">
    <input type="number" id="exWeight" placeholder="الوزن بالكيلو">

    <button onclick="addEntry()">إضافة التمرين</button>
    <button class="btn-clear" onclick="clearData()">مسح كل البيانات</button>

    <ul id="logList"></ul>
</div>

<script>
    let workoutLog = JSON.parse(localStorage.getItem('myWorkouts')) || [];

    updateUI();

    function addEntry() {
        const nameInput = document.getElementById('exName');
        const weightInput = document.getElementById('exWeight');

        const name = nameInput.value.trim();
        const weight = parseFloat(weightInput.value);

        if (name === "" || isNaN(weight)) {
            alert("سجل البيانات الأول يا بطل!");
            return;
        }

        if (weight <= 0) {
            alert("الوزن لازم يكون أكبر من صفر");
            return;
        }

        workoutLog.push({
            name: name,
            weight: weight,
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem('myWorkouts', JSON.stringify(workoutLog));

        updateUI();

        nameInput.value = "";
        weightInput.value = "";
        nameInput.focus();
    }

    function updateUI() {
        const list = document.getElementById('logList');
        list.innerHTML = "";

        workoutLog.forEach((item, index) => {
            const li = document.createElement("li");

            const nameSpan = document.createElement("span");
            nameSpan.textContent = item.name;

            const weightStrong = document.createElement("strong");
            weightStrong.textContent = item.weight + " كيلو";

            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "حذف";
            deleteBtn.className = "delete-btn";

            deleteBtn.onclick = () => {
                workoutLog.splice(index, 1);
                localStorage.setItem('myWorkouts', JSON.stringify(workoutLog));
                updateUI();
            };

            li.appendChild(nameSpan);
            li.appendChild(weightStrong);
            li.appendChild(deleteBtn);

            list.appendChild(li);
        });
    }

    function clearData() {
        if (confirm("هل تريد مسح كل التمارين؟")) {
            localStorage.removeItem('myWorkouts');
            workoutLog = [];
            updateUI();
        }
    }
</script>

</body>
</html>
